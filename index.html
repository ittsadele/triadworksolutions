<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triad Work Solutions – CED & Servizi Amministrativi</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --blu-scuro: #1a2a6c;
  --blu-royal: #2341b0;
  --blu-medio: #2d53d4;
  --blu-chiaro: #e8edfb;
  --blu-accent: #3d68ff;
  --bianco: #ffffff;
  --grigio-chiaro: #f4f6fc;
  --grigio-testo: #4a5568;
  --testo-scuro: #111827;
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--testo-scuro);
  background: var(--bianco);
  line-height: 1.7;
  overflow-x: hidden;
}

/* NAV */

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 70px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(26,42,108,0.08);
  transition: box-shadow .3s;
}

nav.scrolled {
  box-shadow: 0 2px 24px rgba(26,42,108,0.10);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-mark {
  width: 38px;
  height: 38px;
  background: var(--blu-scuro);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: #fff;
  letter-spacing: -0.5px;
}

.nav-logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--blu-scuro);
  line-height: 1.2;
}

.nav-logo-text span {
  display: block;
  font-weight: 400;
  font-size: 11px;
  color: var(--blu-royal);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* HERO */

.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 120px 5% 80px;
  background: var(--blu-scuro);
  position: relative;
  overflow: hidden;
}

.hero-bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-bg-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(61,104,255,0.25) 0%, transparent 70%);
  top: -100px;
  right: -100px;
  pointer-events: none;
}

.hero-bg-glow2 {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(35,65,176,0.3) 0%, transparent 70%);
  bottom: -80px;
  left: 10%;
  pointer-events: none;
}

.hero-inner {
  position: relative;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.hero-tag::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--blu-accent);
  border-radius: 50%;
}

.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.2rem, 4.5vw, 3.8rem);
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}

.hero h1 em {
  font-style: normal;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,255,255,0.5);
}

.hero-desc {
  font-size: 17px;
  color: rgba(255,255,255,0.65);
  font-weight: 300;
  line-height: 1.8;
  margin-bottom: 40px;
  max-width: 480px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  color: var(--blu-scuro);
  font-weight: 600;
  font-size: 15px;
  padding: 14px 28px;
  border-radius: 8px;
  text-decoration: none;
  transition: transform .2s, box-shadow .2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: rgba(255,255,255,0.8);
  font-weight: 500;
  font-size: 15px;
  padding: 14px 28px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  text-decoration: none;
}

</style>
</head>

<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-mark">TWS</div>
    <div class="nav-logo-text">
      Triad Work Solutions
      <span>S.r.l.s.</span>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-bg-grid"></div>
  <div class="hero-bg-glow"></div>
  <div class="hero-bg-glow2"></div>

  <div class="hero-inner">
    <div>
      <div class="hero-tag">CED & Servizi Amministrativi</div>
      <h1>Supporto operativo<br>per il tuo <em>Business</em></h1>
      <p class="hero-desc">
        Gestiamo il carico burocratico quotidiano della tua impresa.
        Tecnologia, puntualità e competenza al servizio di professionisti e aziende.
      </p>
      <a href="#" class="btn-primary">Scopri i servizi →</a>
    </div>
  </div>
</section>

</body>
</html>
